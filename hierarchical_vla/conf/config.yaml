# Main configuration file for MambaVLA training

# Data configuration
data_directory: /home/choi/LGHA/LIBERO/libero/datasets/libero_90
use_all_suites: false
max_len_data: 260  # Maximum sequence length in dataset
demos_per_task: 50  # Number of demonstrations per task to load

# Dataset dimensions (usually fixed)
obs_dim: 32
action_dim: 7
state_dim: 45

# Model configuration
image_encoder_type: resnet  # Image encoder type: "resnet" or "eagle"
latent_dim: 256  # Dimension of encoded image features
embed_dim: 256  # Embedding dimension for Mamba backbone
n_layer: 5  # Number of Mamba layers
d_intermediate: 256  # Intermediate dimension for MLP
obs_tok_len: 2  # Number of observation tokens
action_seq_len: 10  # Length of action sequence
sampling_steps: 4  # Number of sampling steps for action generation

# Eagle encoder configuration (only used when image_encoder_type=eagle)
eagle_tune_llm: false  # Whether to tune Eagle's language model (default: false, keeps LLM frozen)
eagle_tune_visual: true  # Whether to tune Eagle's vision model (default: true, allows vision fine-tuning)

# Training configuration
batch_size: 256
num_epochs: 2000
learning_rate: 1e-4
transformer_weight_decay: 0.05
obs_encoder_weight_decay: 0.05
betas: [0.9, 0.9]
enable_ema: true
ema_decay_rate: 0.995
enable_data_scaling: true
data_scaler_type: minmax  # Options: minmax, action
save_freq: 10  # Save checkpoint every N epochs
num_workers: 4

# Evaluation configuration
eval_during_training: null  # null means disabled, set to integer for frequency (e.g., 100)
eval_benchmark_type: libero_object  # Options: libero_object, libero_spatial, libero_goal, libero_10, libero_90
eval_all_suites: false  # Evaluate on all suites one by one
eval_num_rollouts: 5  # Number of evaluation rollouts per task
eval_max_steps: 400  # Maximum steps per evaluation episode
eval_use_multiprocessing: false  # Enable multiprocessing for evaluation
eval_n_cores: 4  # Number of CPU cores for multiprocessing evaluation
render_image: false
save_video: false
save_video_dir: null
seed: 42

# Wandb configuration
wandb:
  project: MambaVLA-Immitaion-Learning
  entity: your_wandb_entity  # wandb 계정으로 변경
  name: new_model
  enabled: true  # Set to false to disable wandb logging

# Resume configuration
resume_checkpoint: null  # Path to checkpoint to resume from (e.g. ./checkpoints/libero_object/epoch_00110.pth)

# Device configuration
device: null  # null means auto-detect

# Output directory
save_dir: ./checkpoints
